name: Release

# Release engineering per docs/spec/08-testing.md (mirrors backend REL-002/003/004):
#  - release-please maintains version.txt + CHANGELOG from conventional commits
#  - while a release PR is open, each main build publishes an RC prerelease with APKs
#  - the versioned release gets final APKs attached to its notes (no store publishing)

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      pr: ${{ steps.rp.outputs.pr }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple

  build:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || needs.release-please.outputs.pr }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Determine version
        id: version
        run: |
          if [ "${{ needs.release-please.outputs.release_created }}" = "true" ]; then
            echo "kind=final" >> "$GITHUB_OUTPUT"
            echo "version=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            NEXT=$(echo '${{ needs.release-please.outputs.pr }}' | jq -r '.title' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            echo "kind=rc" >> "$GITHUB_OUTPUT"
            echo "version=v${NEXT}-rc.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build APKs
        run: ./gradlew :app:assembleDebug :app:assembleRelease
      - name: Rename artifacts
        run: |
          cp app/build/outputs/apk/release/app-release.apk roadtrip-${{ steps.version.outputs.version }}.apk
          cp app/build/outputs/apk/debug/app-debug.apk roadtrip-${{ steps.version.outputs.version }}-debug.apk
      - name: Publish release candidate (prerelease)
        if: steps.version.outputs.kind == 'rc'
        run: |
          gh release delete "${{ steps.version.outputs.version }}" --yes 2>/dev/null || true
          gh release create "${{ steps.version.outputs.version }}" \
            --prerelease \
            --target "${{ github.sha }}" \
            --title "Release candidate ${{ steps.version.outputs.version }}" \
            --notes "Automated release candidate built from \`main\` @ ${{ github.sha }} while the release PR is open." \
            roadtrip-${{ steps.version.outputs.version }}.apk \
            roadtrip-${{ steps.version.outputs.version }}-debug.apk
      - name: Attach final APKs to release notes
        if: steps.version.outputs.kind == 'final'
        run: |
          gh release upload "${{ steps.version.outputs.version }}" \
            roadtrip-${{ steps.version.outputs.version }}.apk \
            roadtrip-${{ steps.version.outputs.version }}-debug.apk
