name: PR

on:
  pull_request:
  push:
    branches: ['claude/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Spec / documentation validation
        run: ./scripts/validate-specs.sh
      - name: Unit tests (core JVM + app Robolectric)
        run: |
          ./gradlew -p core test
          ./gradlew :app:testDebugUnitTest
      - name: Lint
        run: ./gradlew :app:lintDebug

  build-artifact:
    # ANDREL-002 / REL-001 — every PR build produces downloadable APKs.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build APKs
        run: ./gradlew :app:assembleDebug :app:assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: roadtrip-android-${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.sha }}
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          retention-days: 14
