# Grouped weekly dependency updates with a 14-day cooldown, so updates arrive as a
# few consolidated PRs instead of a stream of singletons.
version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    groups:
      gradle-dependencies:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    groups:
      actions:
        patterns:
          - '*'
